<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .nav-tabs button {
            padding: 10px 20px;
            border: none;
            background: #ddd;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .nav-tabs button.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        #submitBtn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        #submitBtn:hover {
            background: #764ba2;
        }
        #submitBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>

        <div class="nav-tabs">
            <button class="nav-btn active" data-tab="lotto">Lotto Generator</button>
            <button class="nav-btn" data-tab="partnership">Partnership Inquiry</button>
        </div>

        <!-- Lotto Tab -->
        <div id="lotto" class="tab-content active">
            <h1>Lotto Number Generator</h1>
            <div class="lotto-numbers" id="lotto-numbers"></div>
            <button id="generate-btn">Generate Numbers</button>
        </div>

        <!-- Partnership Inquiry Tab -->
        <div id="partnership" class="tab-content">
            <h1>Partnership Inquiry</h1>
            <p style="margin-bottom: 20px; color: #666;">We're looking for partners to grow together</p>

            <form id="partnershipForm">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required />
                </div>

                <div class="form-group">
                    <label for="company">Company *</label>
                    <input type="text" id="company" name="company" placeholder="Enter company name" required />
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required />
                </div>

                <div class="form-group">
                    <label for="category">Partnership Type *</label>
                    <select id="category" name="category" required>
                        <option value="">Select one</option>
                        <option value="Technology">Technology Partnership</option>
                        <option value="Marketing">Marketing Partnership</option>
                        <option value="Business">Business Partnership</option>
                        <option value="Investment">Investment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" placeholder="Please describe your partnership proposal" required></textarea>
                </div>

                <button type="submit" id="submitBtn">Send Inquiry</button>
                <div class="message success-msg" id="successMsg">Your inquiry has been sent successfully!</div>
                <div class="message error-msg" id="errorMsg">An error occurred. Please try again.</div>
            </form>
        </div>
    </div>

    <div id="disqus_thread" style="margin-top: 50px;"></div>

    <script src="main.js"></script>
    <script>
        // Tab switching
        const navBtns = document.querySelectorAll('.nav-btn');
        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all buttons and tabs
                navBtns.forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

                // Add active class to clicked button and corresponding tab
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // Partnership form submission
        const form = document.getElementById('partnershipForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch('https://formspree.io/f/mnjgzodw', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        company: document.getElementById('company').value,
                        email: document.getElementById('email').value,
                        category: document.getElementById('category').value,
                        message: document.getElementById('message').value,
                    }),
                });

                if (response.ok) {
                    successMsg.style.display = 'block';
                    form.reset();
                } else {
                    throw new Error('Form submission failed');
                }
            } catch (error) {
                console.error('Error:', error);
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Inquiry';
            }
        });
    </script>

</body>
</html>
