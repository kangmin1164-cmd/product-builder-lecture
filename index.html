<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .nav-tabs button {
            padding: 10px 20px;
            border: none;
            background: #ddd;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .nav-tabs button.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        #submitBtn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        #submitBtn:hover {
            background: #764ba2;
        }
        #submitBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .lotto-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 24px;
            margin: 5px;
        }
        .lotto-yellow {
            background-color: #FFD700;
            color: #333;
        }
        .lotto-blue {
            background-color: #4169E1;
        }
        .lotto-red {
            background-color: #FF4500;
        }
        .lotto-gray {
            background-color: #808080;
        }
        .lotto-green {
            background-color: #2ECC71;
        }
        .comments-toggle-btn {
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .comments-toggle-btn:hover {
            background-color: #764ba2;
        }
        #disqus_thread {
            display: none;
        }
        #disqus_thread.visible {
            display: block;
        }
        .animal-test-container {
            text-align: center;
        }
        #webcam-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
        #webcam-container canvas {
            border: 2px solid #667eea;
            border-radius: 10px;
            max-width: 100%;
        }
        #label-container {
            margin-top: 30px;
            font-size: 18px;
        }
        .label-item {
            padding: 15px;
            margin: 10px 0;
            background: #f0f0f0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .label-item strong {
            color: #667eea;
            font-size: 20px;
        }
        #startBtn {
            padding: 12px 30px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        #startBtn:hover {
            background-color: #764ba2;
        }
        #startBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .animal-result {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            display: none;
        }
        .animal-result.show {
            display: block;
        }
        .animal-result h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>

        <div class="nav-tabs">
            <button class="nav-btn active" data-tab="lotto">Lotto Generator</button>
            <button class="nav-btn" data-tab="partnership">Partnership Inquiry</button>
            <button class="nav-btn" data-tab="animal">Animal Type Test</button>
        </div>

        <!-- Lotto Tab -->
        <div id="lotto" class="tab-content active">
            <h1>Lotto Number Generator</h1>
            <div class="lotto-numbers" id="lotto-numbers"></div>
            <button id="generate-btn">Generate Numbers</button>
        </div>

        <!-- Partnership Inquiry Tab -->
        <div id="partnership" class="tab-content">
            <h1>Partnership Inquiry</h1>
            <p style="margin-bottom: 20px; color: #666;">We're looking for partners to grow together</p>

            <form id="partnershipForm">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required />
                </div>

                <div class="form-group">
                    <label for="company">Company *</label>
                    <input type="text" id="company" name="company" placeholder="Enter company name" required />
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required />
                </div>

                <div class="form-group">
                    <label for="category">Partnership Type *</label>
                    <select id="category" name="category" required>
                        <option value="">Select one</option>
                        <option value="Technology">Technology Partnership</option>
                        <option value="Marketing">Marketing Partnership</option>
                        <option value="Business">Business Partnership</option>
                        <option value="Investment">Investment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" placeholder="Please describe your partnership proposal" required></textarea>
                </div>

                <button type="submit" id="submitBtn">Send Inquiry</button>
                <div class="message success-msg" id="successMsg">Your inquiry has been sent successfully!</div>
                <div class="message error-msg" id="errorMsg">An error occurred. Please try again.</div>
            </form>
        </div>

        <!-- Animal Type Test Tab -->
        <div id="animal" class="tab-content">
            <h1>Animal Type Test 🐱🐶</h1>
            <p style="margin-bottom: 20px; color: #666;">Find out if you're a cat or dog! Point your camera at your face and let AI decide.</p>
            <div class="animal-test-container">
                <button type="button" id="startBtn" onclick="initAnimalTest()">Start Test</button>
                <div id="webcam-container"></div>
                <div id="label-container"></div>
                <div class="animal-result" id="animalResult">
                    <h3>Your Animal Type:</h3>
                    <div id="resultText" style="font-size: 18px;"></div>
                </div>
            </div>
        </div>

        <!-- Disqus Comments Section -->
        <div style="margin-top: 80px; padding-top: 40px; border-top: 2px solid #eee;">
            <button class="comments-toggle-btn" id="commentsToggleBtn">Show Comments</button>
            <div id="disqus_thread"></div>
        </div>
    </div>

    <!-- Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script src="main.js"></script>
    <script>
        // Animal Type Test
        const URL = "https://teachablemachine.withgoogle.com/models/A3zNekymw/";
        let model, webcam, labelContainer, maxPredictions;
        let animalTestActive = false;

        async function initAnimalTest() {
            if (animalTestActive) return;

            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            startBtn.textContent = 'Loading...';

            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true;
                webcam = new tmImage.Webcam(300, 300, flip);
                await webcam.setup();
                await webcam.play();
                animalTestActive = true;

                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");

                for (let i = 0; i < maxPredictions; i++) {
                    const div = document.createElement("div");
                    div.className = "label-item";
                    labelContainer.appendChild(div);
                }

                startBtn.textContent = 'Stop Test';
                startBtn.onclick = stopAnimalTest;

                window.requestAnimationFrame(loop);
            } catch (error) {
                console.error('Error initializing animal test:', error);
                startBtn.disabled = false;
                startBtn.textContent = 'Start Test';
            }
        }

        function stopAnimalTest() {
            if (webcam) {
                webcam.stop();
            }
            animalTestActive = false;
            const webcamContainer = document.getElementById("webcam-container");
            webcamContainer.innerHTML = '';
            document.getElementById("label-container").innerHTML = '';
            document.getElementById("animalResult").classList.remove('show');

            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = false;
            startBtn.textContent = 'Start Test';
            startBtn.onclick = () => initAnimalTest();
        }

        async function loop() {
            if (!animalTestActive) return;

            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let maxProb = 0;
            let maxClass = '';

            for (let i = 0; i < maxPredictions; i++) {
                const probability = prediction[i].probability.toFixed(2);
                const classPrediction = prediction[i].className + ": " + probability;
                labelContainer.childNodes[i].innerHTML = classPrediction;

                if (prediction[i].probability > maxProb) {
                    maxProb = prediction[i].probability;
                    maxClass = prediction[i].className;
                }
            }

            if (maxProb > 0.7) {
                document.getElementById('resultText').innerHTML = `<strong>${maxClass}</strong> (${(maxProb * 100).toFixed(1)}%)`;
                document.getElementById('animalResult').classList.add('show');
            } else {
                document.getElementById('animalResult').classList.remove('show');
            }
        }
    </script>
    <script>
        // Tab switching
        const navBtns = document.querySelectorAll('.nav-btn');
        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all buttons and tabs
                navBtns.forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

                // Add active class to clicked button and corresponding tab
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // Partnership form submission
        const form = document.getElementById('partnershipForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');

        // Comments toggle
        const commentsToggleBtn = document.getElementById('commentsToggleBtn');
        const disqusThread = document.getElementById('disqus_thread');
        let commentsVisible = false;

        commentsToggleBtn.addEventListener('click', () => {
            commentsVisible = !commentsVisible;
            if (commentsVisible) {
                disqusThread.classList.add('visible');
                commentsToggleBtn.textContent = 'Hide Comments';
            } else {
                disqusThread.classList.remove('visible');
                commentsToggleBtn.textContent = 'Show Comments';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch('https://formspree.io/f/mnjgzodw', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        company: document.getElementById('company').value,
                        email: document.getElementById('email').value,
                        category: document.getElementById('category').value,
                        message: document.getElementById('message').value,
                    }),
                });

                if (response.ok) {
                    successMsg.style.display = 'block';
                    form.reset();
                } else {
                    throw new Error('Form submission failed');
                }
            } catch (error) {
                console.error('Error:', error);
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Inquiry';
            }
        });
    </script>

</html>
